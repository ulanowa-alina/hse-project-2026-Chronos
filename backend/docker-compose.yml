services:
  db:
    image: postgres:15
    container_name: chronos_db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronos_backend
    depends_on:
      - db
    ports:
      - "8080:8080"
      - "9100:9100"
    command: ["./build/chronos_backend", "0.0.0.0", "8080"]
    env_file:
      - .env
    volumes:
      - ./logs:/app/backend/logs

  prometheus:
    image: prom/prometheus:latest
    container_name: chronos_prometheus
    depends_on:
      - backend
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

volumes:
  postgres_data:
  prometheus_data:
